version: "3.8"

services:
  brand2context-api:
    build:
      context: ..
      dockerfile: web/backend/Dockerfile
    ports:
      - "8004:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-sk-cp-49r5TFMzeb7-z-HCbtIPK3h7NZPVs8QJIPVIBC9S3JDjeHq4pKU6YZ-srAyN1YH3-LR6wS0ot4f6xEcqR34SsBpE-yPuW-9kb_yGlDRaive4lhwduA3UAZs}
      - LLM_API_KEY=${LLM_API_KEY:-sk-cp-49r5TFMzeb7-z-HCbtIPK3h7NZPVs8QJIPVIBC9S3JDjeHq4pKU6YZ-srAyN1YH3-LR6wS0ot4f6xEcqR34SsBpE-yPuW-9kb_yGlDRaive4lhwduA3UAZs}
      - LLM_MODEL=${LLM_MODEL:-MiniMax-M2.7}
      - LLM_ENDPOINT=${LLM_ENDPOINT:-https://api.minimax.chat/v1/chat/completions}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-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}
      - LINK2CONTEXT_URL=${LINK2CONTEXT_URL:-http://67.209.190.54:8000}
      - SOCIAL_API_URL=http://host.docker.internal:8006
      - METASO_API_KEY=${METASO_API_KEY:-mk-DA5C2447D54689CD7757A0C4AB162CA3}
      - DATABASE_URL=sqlite:///data/brand2context.db
      - CHROMA_HOST=brand2context-chroma
      - CHROMA_PORT=8005
    volumes:
      - brand-data:/app/data
    depends_on:
      - brand2context-chroma

  brand2context-web:
    build:
      context: ..
      dockerfile: web/frontend/Dockerfile
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://67.209.190.54:8004
    depends_on:
      - brand2context-api

  brand2context-chroma:
    image: chromadb/chroma:latest
    ports:
      - "8005:8000"
    volumes:
      - chroma-data:/chroma/chroma

volumes:
  brand-data:
  chroma-data:
